name: SAST/SCA Security Analysis
on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

jobs: 
  # 🚧 REPLACE THE JOB SECTION WITH WORKSHOP CONTENT! 🚧
  # Copy from: workshop/code_scan/sast/{tool}/workflow.yml 
  semgrep-scan:
    name: Semgrep Community Scan
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.scan-result.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Semgrep Community Edition
        run: pip install semgrep

      - name: Run Semgrep Security Scan
        id: semgrep-tool
        run: |
          semgrep \
            --config=p/security-audit \
            --config=p/javascript \
            --config=p/owasp-top-ten \
            --error \
            --sarif \
            --output=semgrep-results.sarif \
            ./code/ || echo "SEMGREP_EXIT_CODE=$?" >> "$GITHUB_ENV"

      - name: Summarize findings
        if: always() && hashFiles('semgrep-results.sarif') != ''
        run: |
          COUNT=$(jq '[.runs[].results[]] | length' semgrep-results.sarif)
          if [ "${COUNT:-0}" -eq 0 ]; then
            echo "✅ No security alerts"
          else
            echo "❌ Found $COUNT Semgrep finding(s):"
            jq -r '.runs[].results[] |
              "  - \(.ruleId) | \(.message.text)\n      \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine // 1)"' \
              semgrep-results.sarif
          fi

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@b2f9ef845756500b97acbdaf5c1dd4e9c1d15734 # v3.35.2
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
        if: always()

      - name: Set scan result
        id: scan-result
        if: always()
        run: |
          # Semgrep exit codes: 0=no findings, 1=findings found, 2+=error
          if [ "${{ steps.semgrep-tool.outcome }}" == "success" ] && [ -z "$SEMGREP_EXIT_CODE" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "✅ Semgrep scan passed - no vulnerabilities found"
          elif [ "$SEMGREP_EXIT_CODE" == "1" ] || [ "${{ steps.semgrep-tool.outcome }}" == "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "❌ Semgrep scan failed - vulnerabilities detected"
            if [ "${{ github.event_name }}" == "pull_request" ]; then
              echo "🔍 View findings: https://github.com/${{ github.repository }}/security/code-scanning?query=pr%3A${{ github.event.number }}+is%3Aopen"
            else
              echo "🔍 View findings: https://github.com/${{ github.repository }}/security/code-scanning"
            fi
            exit 1
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "❌ Semgrep scan encountered an error"
            exit 1
          fi

  # 🚧 REPLACE THE JOB SECTION WITH WORKSHOP CONTENT! 🚧
  # Copy from: workshop/code_scan/sca/{tool}/workflow.yml
  code-scan:
    name: Code Scan with Dependency Check
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.scan-result.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Dependency Check scanner
        id: scan-tool
        uses: dependency-check/Dependency-Check_Action@75ba02d6183445fe0761d26e836bde58b1560600 # 1.1.0
        with:
          project: 'code'
          path: './code'
          format: 'ALL'
          others: '--failOnCVSS=7'

      - name: Summarize findings
        if: always() && hashFiles('reports/dependency-check-report.sarif') != ''
        run: |
          SARIF=reports/dependency-check-report.sarif
          COUNT=$(jq '[.runs[].results[]] | length' "$SARIF")
          if [ "${COUNT:-0}" -eq 0 ]; then
            echo "✅ No vulnerabilities found"
          else
            echo "❌ Found $COUNT Dependency Check finding(s):"
            jq -r '.runs[].results[] |
              "  - \(.ruleId) | \(.message.text)\n      \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine // 1)"' \
              "$SARIF"
          fi

      - name: Upload SARIF to GitHub Code Scanning
        if: always() && hashFiles('reports/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@b2f9ef845756500b97acbdaf5c1dd4e9c1d15734 # v3.35.2
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check-sca

      - name: Set scan result
        id: scan-result
        if: always()
        run: |
          if [ "${{ steps.scan-tool.outcome }}" == "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "✅ Code scan passed — no critical vulnerabilities found"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "❌ Code scan failed — vulnerabilities detected"
            if [ "${{ github.event_name }}" == "pull_request" ]; then
              echo "🔍 View findings: https://github.com/${{ github.repository }}/security/code-scanning?query=pr%3A${{ github.event.number }}+is%3Aopen"
            else
              echo "🔍 View findings: https://github.com/${{ github.repository }}/security/code-scanning"
            fi
            exit 1
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
            name: Dependency Check Report
            path: ${{github.workspace}}/reports
            
  codeql-scan:
    name: CodeQL SAST Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    outputs:
      result: ${{ steps.scan-result.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL toolchain
        uses: github/codeql-action/init@b2f9ef845756500b97acbdaf5c1dd4e9c1d15734 # v3.35.2
        with:
          languages: javascript

      - name: Add codeql to PATH
        run: find "$RUNNER_TOOL_CACHE/CodeQL" -name codeql -type f -printf '%h\n' -quit >> "$GITHUB_PATH"

      - name: Build CodeQL database
        run: |
          codeql database create codeql-db \
            --language=javascript \
            --source-root=.

      - name: Run CodeQL analysis
        id: codeql-tool
        run: |
          mkdir -p codeql-results
          codeql database analyze codeql-db \
            --format=sarif-latest \
            --output=codeql-results/javascript.sarif \
            codeql/javascript-queries:codeql-suites/javascript-security-extended.qls

      - name: Summarize findings
        if: always() && hashFiles('codeql-results/*.sarif') != ''
        run: |
          COUNT=$(jq '[.runs[].results[]] | length' codeql-results/*.sarif | awk '{s+=$1} END {print s}')
          if [ "${COUNT:-0}" -eq 0 ]; then
            echo "✅ No security alerts"
          else
            echo "❌ Found $COUNT CodeQL finding(s):"
            jq -r '.runs[].results[] |
              "  - \(.ruleId) | \(.message.text)\n      \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine // 1)"' \
              codeql-results/*.sarif
          fi

      - name: Upload SARIF to GitHub Advanced Security
        if: always() && hashFiles('codeql-results/*.sarif') != ''
        uses: github/codeql-action/upload-sarif@b2f9ef845756500b97acbdaf5c1dd4e9c1d15734 # v3.35.2
        with:
          sarif_file: codeql-results
          category: codeql

      - name: Set scan result
        id: scan-result
        if: always()
        run: |
          if [ "${{ steps.codeql-tool.outcome }}" != "success" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "❌ CodeQL scan encountered an error"
            exit 1
          fi
          if ! ls codeql-results/*.sarif >/dev/null 2>&1; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "✅ CodeQL scan completed - no SARIF produced (no findings)"
            exit 0
          fi
          COUNT=$(jq '[.runs[].results[]] | length' codeql-results/*.sarif | awk '{s+=$1} END {print s}')
          if [ "${COUNT:-0}" -gt 0 ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "❌ CodeQL found $COUNT security alert(s)"
            if [ "${{ github.event_name }}" == "pull_request" ]; then
              echo "🔍 View findings: https://github.com/${{ github.repository }}/security/code-scanning?query=pr%3A${{ github.event.number }}+is%3Aopen"
            else
              echo "🔍 View findings: https://github.com/${{ github.repository }}/security/code-scanning"
            fi
            exit 1
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "✅ CodeQL scan completed - no security alerts"
          fi
